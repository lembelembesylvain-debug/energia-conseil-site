<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Génération Rapport Audit PDF - M. GRANGE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    <h1 style="text-align:center; color:#16a34a;">Génération du rapport d'audit PDF en cours...</h1>

    <script>
        window.onload = function() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const margin = 20;
            const pageW = doc.internal.pageSize.getWidth();
            const green = [22, 163, 74];

            // PAGE 1 : COUVERTURE
            doc.setFontSize(24);
            doc.setTextColor(...green);
            doc.text('ENERGIA CONSEIL', pageW / 2, 50, { align: 'center' });
            doc.setFontSize(18);
            doc.setTextColor(0, 0, 0);
            doc.text('AUDIT ÉNERGÉTIQUE RÉGLEMENTAIRE', pageW / 2, 75, { align: 'center' });
            doc.setFontSize(14);
            doc.text('Maison individuelle - 101 m²', pageW / 2, 90, { align: 'center' });
            doc.text('569 Chemin des Places, 42360 MONTCHAL', pageW / 2, 100, { align: 'center' });
            doc.setFontSize(11);
            doc.text('Date : 1er mars 2026', pageW / 2, 120, { align: 'center' });
            doc.text('Client : M. GRANGE Mathias', pageW / 2, 130, { align: 'center' });

            // PAGE 2 : SYNTHÈSE
            doc.addPage();
            doc.setFontSize(16);
            doc.setTextColor(...green);
            doc.text('Synthèse exécutive', margin, 20);
            doc.setFontSize(10);
            doc.setTextColor(0, 0, 0);
            let y = 30;
            ['Situation actuelle : DPE G (400 kWh/m²/an), facture 3 500 €/an.',
             'Bâtiment : 101 m², murs pisé, construction 1948-1974.',
             '',
             'Scénario recommandé : 9 postes de travaux.',
             'Investissement total : 45 576 € TTC.',
             'Aides : 14 090 € (MaPrimeRénov\' 10 340 € + CEE 3 750 €).',
             'Reste à charge : 31 486 €.',
             '',
             'Performance après travaux : DPE D/C, 140 kWh/m²/an, 2 200 €/an.',
             'Économies annuelles : 1 300 €.'].forEach(function(l) { doc.text(l, margin, y); y += 7; });

            // PAGES 3-5 : DIAGNOSTIC DÉTAILLÉ
            doc.addPage();
            doc.setFontSize(14);
            doc.setTextColor(...green);
            doc.text('Diagnostic actuel - Caractéristiques du bâti', margin, 20);
            doc.setFontSize(10);
            doc.setTextColor(0, 0, 0);
            y = 30;
            ['Surface habitable : 101 m²',
             'Type construction : Maison individuelle, murs en pisé',
             'Période : 1948-1974',
             'Combles : Perdus, isolation insuffisante ou absente',
             'Murs : Pisé non isolé (ITI obligatoire recommandé)',
             'Menuiseries : 5 fenêtres + 1 porte, simple ou double vitrage ancien',
             'Volets : Absence de volets isolants'].forEach(function(l) { doc.text(l, margin, y); y += 7; });

            doc.setFontSize(12);
            doc.setTextColor(...green);
            doc.text('Déperditions thermiques', margin, 95);
            doc.setFontSize(10);
            doc.setTextColor(0, 0, 0);
            doc.autoTable({
                startY: 102,
                head: [['Élément', 'Part estimée']],
                body: [['Combles', '25%'], ['Murs', '35%'], ['Menuiseries', '20%'], ['Ponts thermiques', '20%']],
                theme: 'grid',
                headStyles: { fillColor: green, textColor: [255, 255, 255] },
                margin: { left: margin },
            });

            doc.addPage();
            doc.setFontSize(12);
            doc.setTextColor(...green);
            doc.text('Systèmes actuels', margin, 20);
            doc.setFontSize(10);
            doc.setTextColor(0, 0, 0);
            y = 30;
            ['Chauffage : Chaudière fioul (à remplacer)',
             'Plafond rayonnant électrique (dégradé)',
             'Ventilation : Naturelle (bouches d\'aération)',
             'ECS : Ballon électrique ou chaudière',
             '',
             'Consommations : 400 kWh/m²/an - Coût annuel : 3 500 €'].forEach(function(l) { doc.text(l, margin, y); y += 7; });

            // PAGES 6-12 : SCÉNARIO RÉNOVATION (9 postes)
            doc.addPage();
            doc.setFontSize(14);
            doc.setTextColor(...green);
            doc.text('Scénario de rénovation - Détail des 9 postes', margin, 20);
            doc.setFontSize(10);
            doc.setTextColor(0, 0, 0);

            const postes = [
                ['1', 'Isolation combles perdus 60m² - Laine roche 300mm R=7', '2 500 €', '2 638 €'],
                ['2', 'ITI laine roche 120mm 100m² - R=3,7 + Placo (murs pisé)', '8 000 €', '8 440 €'],
                ['3', '5 Fenêtres PVC 1×1,5m - Double vitrage Uw=1,3', '6 000 €', '6 330 €'],
                ['4', '5 Volets solaires motorisés', '3 500 €', '3 693 €'],
                ['5', 'Porte PVC/Alu 0,8×2,2m - Ud=1,3, A2P', '2 500 €', '2 638 €'],
                ['6', 'PAC Air-Air 5 splits - COP 3,8 Réversible', '7 500 €', '7 913 €'],
                ['7', 'VMC simple flux hygroréglable 101m²', '1 500 €', '1 583 €'],
                ['8', 'Ballon thermodynamique 200L - COP 3,5', '2 200 €', '2 321 €'],
                ['9', 'Coordination & MAR - Suivi + gestion dossiers aides', '9 500 €', '10 023 €'],
            ];

            doc.autoTable({
                startY: 30,
                head: [['N°', 'Désignation', 'Prix HT', 'Prix TTC']],
                body: postes,
                theme: 'grid',
                headStyles: { fillColor: green, textColor: [255, 255, 255] },
                columnStyles: {
                    0: { cellWidth: 15 },
                    1: { cellWidth: 95 },
                    2: { cellWidth: 35, halign: 'right' },
                    3: { cellWidth: 35, halign: 'right' }
                },
                styles: { fontSize: 9 }
            });

            // PAGES 13-14 : AIDES FINANCIÈRES
            doc.addPage();
            doc.setFontSize(14);
            doc.setTextColor(...green);
            doc.text('Aides financières', margin, 20);
            doc.setFontSize(10);
            doc.setTextColor(0, 0, 0);
            doc.text('MaPrimeRénov\' Parcours Accompagné - Profil JAUNE (70%) : 10 340 €', margin, 32);
            doc.text('Certificats d\'Économies d\'Énergie (CEE) : 3 750 €', margin, 42);
            doc.text('TOTAL AIDES : 14 090 €', margin, 52);
            doc.text('RESTE À CHARGE : 31 486 €', margin, 65);
            doc.text('Financement courtier disponible : 31 486 € sur 10 ans, 0 € d\'apport.', margin, 80, { maxWidth: pageW - 2 * margin });

            // PAGE 15 : CONTACTS
            doc.addPage();
            doc.setFontSize(14);
            doc.setTextColor(...green);
            doc.text('Contacts & prochaines étapes', margin, 20);
            doc.setFontSize(10);
            doc.setTextColor(0, 0, 0);
            doc.text('ENERGIA CONSEIL', margin, 35);
            doc.text('16 Rue Cuvier, 69006 Lyon', margin, 42);
            doc.text('Tél : 06 10 59 68 98', margin, 49);
            doc.text('contact@energia-conseil.com', margin, 56);
            doc.text('LÉO-ENERGY (MAR)', margin, 70);
            doc.text('Courtier travaux : partenaire disponible', margin, 80);
            doc.text('Prochaines étapes : Validation devis → Financement → MAR → MaPrimeRénov\' → Travaux', margin, 95, { maxWidth: pageW - 2 * margin });

            doc.setFontSize(8);
            doc.setTextColor(100, 100, 100);
            doc.text('Rapport généré le 1er mars 2026 - Energia Conseil', margin, doc.internal.pageSize.getHeight() - 10);

            doc.save('RAPPORT_AUDIT_M_GRANGE_Mathias.pdf');

            document.body.innerHTML = '<h1 style="text-align:center; color:#16a34a; margin-top:200px;">✅ Rapport d\'audit PDF téléchargé avec succès !<br><br>Vérifiez votre dossier Téléchargements.</h1>';
        };
    </script>
</body>
</html>
